# ============================================================
# VOICE — How Rume communicates in cover letters and outreach
# ============================================================
voice:
  tone: "Authoritative in information yet calm. Outspoken yet not argumentative. Effortlessly innovative. Edgy."
  never_do:
    - "Use founder/CEO/entrepreneur language in IC role applications"
    - "Mention Vorem Nigeria as a founder role — reframe as Lead AI/ML Engineer"
    - "Use 'visionary' or 'thought leader' self-descriptors"
    - "Use hollow phrases: 'passionate about', 'love to', 'excited to'"
    - "Write more than 3 short paragraphs in a cover letter"
  always_do:
    - "Lead with a specific, concrete proof point from Rume's work"
    - "Bridge AI engineering depth with business strategy outcomes"
    - "Reference production systems, not just concepts"
    - "Match JD vocabulary precisely — use their words, Rume's proof"
    - "Close with a forward-looking statement — what Rume will build, not who Rume is"

